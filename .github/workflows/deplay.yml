name: deploy

on:
    push:
    workflow_dispatch:
    # schedule:
    #     # Runs everyday at 8:00 AM
    #     - cron: "0 0 * * *"

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v2
              with:
                  submodules: true
                  fetch-depth: 0
              run: git config --global core.quotePath false

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v2
              with:
                  hugo-version: "latest"

            - name: Build Web
              run: hugo

            - name: Deploy Web
              uses: peaceiris/actions-gh-pages@v3
              with:
                  personal_token: ${{ secrets.PERSONAL_TOKEN }}
                  external_repository: 1262706090/1262706090.github.io
                  publish_branch: main
                  publish_dir: ./public
                  commit_message: ${{ github.event.head_commit.message }}
